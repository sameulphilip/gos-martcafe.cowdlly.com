version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gosmart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gosmart
    ports:
      - "5432:5432"
    volumes:
      - gosmart_data:/var/lib/postgresql/data

volumes:
  gosmart_data:
